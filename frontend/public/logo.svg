<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#080e09"/>

  <!-- Subtle radial glow -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="52%">
      <stop offset="0%" stop-color="#19D184" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#19D184" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Cloud body: three stacked circles + base fill -->
  <circle cx="36" cy="56" r="14" fill="#0f1f12"/>
  <circle cx="50" cy="46" r="19" fill="#0f1f12"/>
  <circle cx="64" cy="56" r="14" fill="#0f1f12"/>
  <!-- Fill the bottom gap between circles -->
  <rect x="24" y="56" width="52" height="14" fill="#0f1f12"/>
  <!-- Rounded bottom -->
  <rect x="24" y="62" width="52" height="10" rx="5" fill="#0f1f12"/>

  <!-- Cloud outline highlight -->
  <path d="M24,68 Q24,63 29,62 L29,56 A14,14,0,0,1,43,42 A19,19,0,0,1,57,37 A19,19,0,0,1,71,46 A14,14,0,0,1,76,56 L76,62 Q81,63 81,68 Z"
        stroke="#19D184" stroke-width="1.2" stroke-opacity="0.45" fill="none"/>

  <!-- Swap arrow → (top, pointing right) -->
  <line x1="32" y1="51" x2="59" y2="51" stroke="#19D184" stroke-width="3" stroke-linecap="round"/>
  <polyline points="53,45 59,51 53,57" stroke="#19D184" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Swap arrow ← (bottom, pointing left) -->
  <line x1="68" y1="63" x2="41" y2="63" stroke="#19D184" stroke-width="3" stroke-linecap="round"/>
  <polyline points="47,57 41,63 47,69" stroke="#19D184" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
